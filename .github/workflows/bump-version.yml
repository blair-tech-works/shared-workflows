# Reusable workflow: Auto-bump patch version on merge to main, then draft a GitHub release.
# Mirrors SoulStealer's bump_version.yml pattern.
name: Bump Version & Draft Release

on:
  workflow_call:
    inputs:
      version-type:
        description: "Semver bump type: patch, minor, major"
        required: false
        type: string
        default: "patch"
    secrets:
      BOT_ACCESS_TOKEN:
        description: "PAT with repo write access for version bump commits"
        required: true

jobs:
  bump-version:
    name: Bump Version on main
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version-bump.outputs.newTag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.BOT_ACCESS_TOKEN }}

      - name: Setup Git identity
        run: |
          git config user.name "btw-bot"
          git config user.email "bot@blairtechworks.com"

      - name: Automated Version Bump
        id: version-bump
        uses: phips28/gh-action-bump-version@master
        with:
          version-type: ${{ inputs.version-type }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_ACCESS_TOKEN }}

      - name: Output new tag
        run: echo "New tag ${{ steps.version-bump.outputs.newTag }}"

  draft-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs: bump-version
    if: success() && needs.bump-version.outputs.new_tag != ''
    permissions:
      contents: write
    steps:
      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: Release ${{ needs.bump-version.outputs.new_tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
